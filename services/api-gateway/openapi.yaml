openapi: 3.0.3
info:
  title: Public API Gateway Contract
  version: 0.1.0
  description: Day 2 external route contract for critical-path APIs.
servers:
  - url: https://api.podcast.example.com
paths:
  /api/v1/auth/signup:
    post:
      summary: Public signup endpoint proxied to auth service.
      operationId: gatewaySignup
      responses:
        '201':
          description: Created.
  /api/v1/auth/login:
    post:
      summary: Public login endpoint proxied to auth service.
      operationId: gatewayLogin
      responses:
        '200':
          description: OK.
  /api/v1/catalog/podcasts/{podcast_id}:
    get:
      summary: Read podcast by id.
      operationId: gatewayGetPodcast
      parameters:
        - name: podcast_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK.
  /api/v1/playback/authorize:
    post:
      summary: Playback authorization endpoint.
      operationId: gatewayAuthorizePlayback
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK.
        '403':
          description: Forbidden.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
